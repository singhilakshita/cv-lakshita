<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#1A1A2E">
    <meta name="description" content="Kursi ke liye kuch bhi karega. Bluffing card game set in a satirical India corporate-political underworld.">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Kursi">

    <!-- Open Graph -->
    <meta property="og:title" content="Kursi">
    <meta property="og:description" content="Lie. Bribe. Survive. Repeat.">
    <meta property="og:type" content="website">

    <title>Kursi</title>

    <link rel="manifest" href="manifest.json">
    <link rel="icon" href="favicon.svg" type="image/svg+xml">
    <link rel="apple-touch-icon" href="apple-touch-icon.png">

    <style>
        *, *::before, *::after { box-sizing: border-box; }
        html, body {
            height: 100%;
            margin: 0;
            padding: 0;
            background: #1A1A2E;
            overflow: hidden;
        }
        #ComposeTarget {
            display: block;
            width: 100%;
            height: 100%;
        }
        /* Loading screen — shown until Compose takes over */
        #loader {
            position: fixed;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #1A1A2E;
            color: #F4ECD8;
            font-family: serif;
            font-size: 1.1rem;
            letter-spacing: 0.05em;
            z-index: 9999;
            transition: opacity 0.4s ease;
        }
        #loader.hidden { opacity: 0; pointer-events: none; }
    </style>
</head>
<body>
    <div id="loader">Sab mile hue hain&hellip;</div>
    <canvas id="ComposeTarget"></canvas>
    <script src="cmp-web.js"></script>
    <script>
        // Hide loader once Compose canvas is painting
        const canvas = document.getElementById('ComposeTarget');
        const loader = document.getElementById('loader');
        const obs = new MutationObserver(() => {
            if (canvas.width > 0) {
                loader.classList.add('hidden');
                obs.disconnect();
            }
        });
        obs.observe(canvas, { attributes: true, attributeFilter: ['width'] });
        // Fallback: hide after 5s regardless
        setTimeout(() => loader.classList.add('hidden'), 5000);
    </script>
</body>
</html>
