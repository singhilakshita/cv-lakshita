<svg width="1200" height="360" viewBox="0 0 1200 360" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="cv-title cv-desc">
  <title id="cv-title">cv-siddharth — an interactive résumé with an AI assistant</title>
  <desc id="cv-desc">A tilted phone showing a chat bubble beside a printable résumé sheet, on a near-black dark theme with an Android-green accent.</desc>
  <defs>
    <linearGradient id="cv-bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0b0f0d"/>
      <stop offset="100%" stop-color="#111613"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="360" rx="24" fill="url(#cv-bg)"/>

  <g transform="translate(64,60)">
    <text x="0" y="52" font-family="'Segoe UI', system-ui, -apple-system, sans-serif" font-size="56" font-weight="800" fill="#f4faf6">cv-siddharth</text>
    <text x="0" y="86" font-family="system-ui, sans-serif" font-size="16" letter-spacing="1.5" fill="#8fae9c">AN INTERACTIVE RÉSUMÉ WITH AN AI ASSISTANT</text>

    <text x="0" y="150" font-family="system-ui, sans-serif" font-size="15" fill="#c9d8cf">React 19 · Vite · TypeScript</text>
    <text x="0" y="176" font-family="system-ui, sans-serif" font-size="15" fill="#c9d8cf">Ask it a question — it answers from the résumé itself</text>
    <text x="0" y="202" font-family="system-ui, sans-serif" font-size="15" fill="#c9d8cf">One click to a clean, printable page</text>
  </g>

  <!-- tilted phone with a chat bubble -->
  <g transform="translate(760,50) rotate(-6)">
    <rect x="0" y="0" width="150" height="260" rx="22" fill="#171e1a" stroke="#243029" stroke-width="2"/>
    <rect x="12" y="20" width="126" height="220" rx="8" fill="#0b0f0d"/>
    <rect x="30" y="44" width="90" height="14" rx="7" fill="#243029"/>
    <rect x="30" y="66" width="70" height="14" rx="7" fill="#243029"/>
    <g id="cv-chat">
      <rect x="26" y="100" width="98" height="42" rx="12" fill="#171e1a" stroke="#3ddc84" stroke-width="1.5"/>
      <text x="34" y="118" font-family="system-ui, sans-serif" font-size="9.5" fill="#3ddc84">What's your GPS</text>
      <text x="34" y="130" font-family="system-ui, sans-serif" font-size="9.5" fill="#3ddc84">accuracy story?</text>
    </g>
    <rect x="30" y="156" width="80" height="12" rx="6" fill="#2bb86c" opacity="0.85"/>
    <rect x="30" y="174" width="60" height="12" rx="6" fill="#2bb86c" opacity="0.55"/>
  </g>

  <!-- printable resume sheet, peeking behind -->
  <g id="cv-resume" transform="translate(950,90) rotate(4)">
    <rect x="0" y="0" width="150" height="200" rx="6" fill="#111613" stroke="#243029" stroke-width="2"/>
    <rect x="16" y="20" width="80" height="10" rx="5" fill="#3ddc84"/>
    <rect x="16" y="42" width="118" height="6" rx="3" fill="#243029"/>
    <rect x="16" y="56" width="118" height="6" rx="3" fill="#243029"/>
    <rect x="16" y="70" width="90" height="6" rx="3" fill="#243029"/>
    <rect x="16" y="96" width="60" height="8" rx="4" fill="#8fae9c"/>
    <rect x="16" y="114" width="118" height="6" rx="3" fill="#243029"/>
    <rect x="16" y="128" width="118" height="6" rx="3" fill="#243029"/>
  </g>
</svg>
